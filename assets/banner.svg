<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161221"/>
      <stop offset="100%" stop-color="#231a35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ff5f6d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- subtle dot texture -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="60" cy="40" r="2"/><circle cx="120" cy="90" r="2"/><circle cx="40" cy="180" r="2"/>
    <circle cx="180" cy="220" r="2"/><circle cx="90" cy="260" r="2"/><circle cx="20" cy="120" r="2"/>
  </g>

  <!-- left accent bar -->
  <rect x="0" y="0" width="10" height="300" fill="url(#accent)"/>

  <!-- title block -->
  <text x="60" y="118" font-family="Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#f5f3f7">BINV2130</text>
  <text x="60" y="160" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#c9c3d6">Programmation Java : avancé</text>

  <rect x="60" y="188" width="46" height="4" rx="2" fill="url(#accent)"/>

  <text x="60" y="222" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#9891a8">12 ateliers hebdomadaires · théorie, exercices, solutions</text>
  <text x="60" y="248" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#9891a8">Haute École Léonard de Vinci — José Vander Meulen</text>

  <!-- week grid, 4x3 = 12 weeks -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600">
    <!-- generated below -->
  </g>
  <g id="weeks">
    <!-- row/col layout starting x=760 -->
  </g>

  <g transform="translate(770,55)">
    <!-- 4 cols x 3 rows, 44px cell, 10px gap -->
    <!-- Row 1 -->
    <g transform="translate(0,0)"><rect width="44" height="44" rx="8" fill="#2c2340" stroke="#3c3153"/><text x="22" y="27" text-anchor="middle" fill="#c9c3d6" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600">S1</text></g>
    <g transform="translate(54,0)"><rect width="44" height="44" rx="8" fill="#2c2340" stroke="#3c3153"/><text x="22" y="27" text-anchor="middle" fill="#c9c3d6" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600">S2</text></g>
    <g transform="translate(108,0)"><rect width="44" height="44" rx="8" fill="#2c2340" stroke="#3c3153"/><text x="22" y="27" text-anchor="middle" fill="#c9c3d6" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600">S3</text></g>
    <g transform="translate(162,0)"><rect width="44" height="44" rx="8" fill="#2c2340" stroke="#3c3153"/><text x="22" y="27" text-anchor="middle" fill="#c9c3d6" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600">S4</text></g>
    <!-- Row 2 -->
    <g transform="translate(0,54)"><rect width="44" height="44" rx="8" fill="#2c2340" stroke="#3c3153"/><text x="22" y="27" text-anchor="middle" fill="#c9c3d6" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600">S5</text></g>
    <g transform="translate(54,54)"><rect width="44" height="44" rx="8" fill="#382a52" stroke="url(#accent)" stroke-width="2"/><text x="22" y="27" text-anchor="middle" fill="#ffd9c2" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">S6</text></g>
    <g transform="translate(108,54)"><rect width="44" height="44" rx="8" fill="#2c2340" stroke="#3c3153"/><text x="22" y="27" text-anchor="middle" fill="#c9c3d6" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600">S7</text></g>
    <g transform="translate(162,54)"><rect width="44" height="44" rx="8" fill="#2c2340" stroke="#3c3153"/><text x="22" y="27" text-anchor="middle" fill="#c9c3d6" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600">S8</text></g>
    <!-- Row 3 -->
    <g transform="translate(0,108)"><rect width="44" height="44" rx="8" fill="#2c2340" stroke="#3c3153"/><text x="22" y="27" text-anchor="middle" fill="#c9c3d6" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600">S9</text></g>
    <g transform="translate(54,108)"><rect width="44" height="44" rx="8" fill="#2c2340" stroke="#3c3153"/><text x="22" y="27" text-anchor="middle" fill="#c9c3d6" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600">S10</text></g>
    <g transform="translate(108,108)"><rect width="44" height="44" rx="8" fill="#2c2340" stroke="#3c3153"/><text x="22" y="27" text-anchor="middle" fill="#c9c3d6" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600">S11</text></g>
    <g transform="translate(162,108)"><rect width="44" height="44" rx="8" fill="#2c2340" stroke="#3c3153"/><text x="22" y="27" text-anchor="middle" fill="#c9c3d6" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600">S12</text></g>
  </g>

  <text x="770" y="285" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6f6884">12 semaines · classe inversée</text>
