      <g transform="translate(0,0)"><rect width="56" height="56" rx="10" fill="#2c2340" stroke="#3c3153"/><text x="28" y="34" text-anchor="middle" fill="#c9c3d6">S1</text></g>
      <g transform="translate(66,0)"><rect width="56" height="56" rx="10" fill="#2c2340" stroke="#3c3153"/><text x="28" y="34" text-anchor="middle" fill="#c9c3d6">S2</text></g>
      <g transform="translate(132,0)"><rect width="56" height="56" rx="10" fill="#2c2340" stroke="#3c3153"/><text x="28" y="34" text-anchor="middle" fill="#c9c3d6">S3</text></g>
      <g transform="translate(198,0)"><rect width="56" height="56" rx="10" fill="#2c2340" stroke="#3c3153"/><text x="28" y="34" text-anchor="middle" fill="#c9c3d6">S4</text></g>
      <g transform="translate(264,0)"><rect width="56" height="56" rx="10" fill="#2c2340" stroke="#3c3153"/><text x="28" y="34" text-anchor="middle" fill="#c9c3d6">S5</text></g>
      <g transform="translate(330,0)"><rect width="56" height="56" rx="10" fill="#382a52" stroke="url(#accent)" stroke-width="2"/><text x="28" y="34" text-anchor="middle" fill="#ffd9c2" font-weight="700">S6</text></g>
      <g transform="translate(396,0)"><rect width="56" height="56" rx="10" fill="#2c2340" stroke="#3c3153"/><text x="28" y="34" text-anchor="middle" fill="#c9c3d6">S7</text></g>
      <g transform="translate(462,0)"><rect width="56" height="56" rx="10" fill="#2c2340" stroke="#3c3153"/><text x="28" y="34" text-anchor="middle" fill="#c9c3d6">S8</text></g>
      <g transform="translate(528,0)"><rect width="56" height="56" rx="10" fill="#2c2340" stroke="#3c3153"/><text x="28" y="34" text-anchor="middle" fill="#c9c3d6">S9</text></g>
      <g transform="translate(594,0)"><rect width="56" height="56" rx="10" fill="#2c2340" stroke="#3c3153"/><text x="28" y="34" text-anchor="middle" fill="#c9c3d6" font-size="15">S10</text></g>
      <g transform="translate(660,0)"><rect width="56" height="56" rx="10" fill="#2c2340" stroke="#3c3153"/><text x="28" y="34" text-anchor="middle" fill="#c9c3d6" font-size="15">S11</text></g>
      <g transform="translate(726,0)"><rect width="56" height="56" rx="10" fill="#2c2340" stroke="#3c3153"/><text x="28" y="34" text-anchor="middle" fill="#c9c3d6" font-size="15">S12</text></g>
      <g transform="translate(792,0)"><rect width="192" height="56" rx="10" fill="none" stroke="#3c3153" stroke-dasharray="4 4"/><text x="96" y="34" text-anchor="middle" fill="#6f6884" font-size="15" font-weight="400">buffer / révisions</text></g>
    </g>
